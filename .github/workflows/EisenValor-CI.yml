name: EisenValor-CI

on:
  push:
    branches: [master, Framework-Develop, Dageon-Lee, Seongyeol]
  pull_request:
    branches: [master, Framework-Develop, Dageon-Lee, Seongyeol]

jobs:
  build-client:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with: 
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-client-${{ runner.os }}-${{ hashFiles('EisenValor-Client/**/packages.config', 'EisenValor-Client/**/*.vcxproj') }}
        restore-keys: |
          nuget-client-${{ runner.os }}-

    - name: Build EisenValor-Client
      working-directory: EisenValor-Client
      run: |
        Write-Host "Building EisenValor-Client (${{ matrix.configuration }}|${{ matrix.platform }})"
        
        msbuild *.sln `
          -t:Restore,Build `
          -p:Configuration=${{ matrix.configuration }} `
          -p:Platform=${{ matrix.platform }} `
          -maxCpuCount `
          -verbosity:minimal

    - name: Upload Client Artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: EisenValor-Client-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          EisenValor-Client/Binaries/**/${{ matrix.configuration }}/**/*.exe
          EisenValor-Client/Binaries/**/${{ matrix.configuration }}/**/*.dll
          EisenValor-Client/Binaries/**/${{ matrix.configuration }}/**/*.pdb
          EisenValor-Client/Libraries/**/${{ matrix.configuration }}/**/*.lib
          EisenValor-Client/EisenValor/Resource/Shader/**/*.hlsl
        retention-days: 30

  build-server:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with: 
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-server-${{ runner.os }}-${{ hashFiles('EisenValor-Server/**/packages.config', 'EisenValor-Server/**/*.vcxproj') }}
        restore-keys: |
          nuget-server-${{ runner.os }}-

    - name: Build EisenValor-Server
      working-directory: EisenValor-Server
      run: |
        Write-Host "Building EisenValor-Server (${{ matrix.configuration }}|${{ matrix.platform }})"
        
        msbuild *.sln `
          -t:Restore,Build `
          -p:Configuration=${{ matrix.configuration }} `
          -p:Platform=${{ matrix.platform }} `
          -maxCpuCount `
          -verbosity:minimal

    - name: Upload Server Artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: EisenValor-Server-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          EisenValor-Server/Binaries/**/${{ matrix.configuration }}/**/*.exe
          EisenValor-Server/Binaries/**/${{ matrix.configuration }}/**/*.dll
          EisenValor-Server/Binaries/**/${{ matrix.configuration }}/**/*.pdb
          EisenValor-Server/Libraries/**/${{ matrix.configuration }}/**/*.lib
        retention-days: 30

  build-dummy-client:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with: 
        submodules: recursive

    - name: Add MSBuild to PATH
