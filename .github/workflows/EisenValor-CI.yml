name: EisenValor-CI

on:
  push:
    branches: [master, Framework-Develop, Dageon-Lee, Seongyeol]
  pull_request:
    branches: [master, Framework-Develop, Dageon-Lee, Seongyeol]

jobs:
  build-all:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # EisenValor-Client (Debug / Release)
          - project: "EisenValor-Client"
            solution_path: "EisenValor-Client"
            solution_file: "EisenValor.sln"
            cache_key: "nuget-client"
            configuration: "Debug"
            platform: "x64"
            upload_artifacts: false
          - project: "EisenValor-Client"
            solution_path: "EisenValor-Client"
            solution_file: "EisenValor.sln"
            cache_key: "nuget-client"
            configuration: "Release"
            platform: "x64"
            upload_artifacts: true

          # EisenValor-Server (Debug / Release)
          - project: "EisenValor-Server"
            solution_path: "EisenValor-Server"
            solution_file: "EisenValor-Server.sln"
            cache_key: "nuget-server"
            configuration: "Debug"
            platform: "x64"
            upload_artifacts: false
          - project: "EisenValor-Server"
            solution_path: "EisenValor-Server"
            solution_file: "EisenValor-Server.sln"
            cache_key: "nuget-server"
            configuration: "Release"
            platform: "x64"
            upload_artifacts: true

          # EisenValor-DummyClient (Debug / Release)
          # - project: "EisenValor-DummyClient"
          #   solution_path: "EisenValor-DummyClient"
          #   solution_file: "EisenValor-DummyClient.sln"
          #   cache_key: "nuget-dummy"
          #   configuration: "Debug"
          #   platform: "x64"
          #   upload_artifacts: false
          # - project: "EisenValor-DummyClient"
          #   solution_path: "EisenValor-DummyClient"
          #   solution_file: "EisenValor-DummyClient.sln"
          #   cache_key: "nuget-dummy"
          #   configuration: "Release"
          #   platform: "x64"
          #   upload_artifacts: true

    name: "Build ${{ matrix.project }} (${{ matrix.configuration }}|${{ matrix.platform }})"

    steps:
    - name: Checkout repository (with submodules)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSBuild (VS 2022)
      uses: microsoft/setup-msbuild@v2

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.USERPROFILE }}\.nuget\packages
          ${{ matrix.solution_path }}\packages
        key: ${{ matrix.cache_key }}-${{ runner.os }}-${{ hashFiles(format('{0}/**/packages.config', matrix.solution_path), format('{0}/**/*.vcxproj', matrix.solution_path)) }}
        restore-keys: |
          ${{ matrix.cache_key }}-${{ runner.os }}-

    - name: Setup NuGet CLI (6.x)
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: "6.x"

    - name: Detect NuGet package management and restore
      working-directory: ${{ matrix.solution_path }}
      run: |
        Write-Host "Detecting NuGet package management for ${{ matrix.project }}..."
        
        $packagesConfigFiles = Get-ChildItem -Path . -Name "packages.config" -Recurse -ErrorAction SilentlyContinue
        $hasPackagesConfig = $packagesConfigFiles.Count -gt 0
        
        $vcxprojFiles = Get-ChildItem -Path . -Name "*.vcxproj" -Recurse -ErrorAction SilentlyContinue
        $hasPackageReference = $false
        $packageRefCount = 0
        
        foreach ($proj in $vcxprojFiles)
        {
          try
          {
            $content = Get-Content $proj.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -match "<PackageReference\s+Include=")
            {
              $hasPackageReference = $true
              $matches = [regex]::Matches($content, "<PackageReference\s+Include=")
              $packageRefCount += $matches.Count
            }
          }
          catch
          {
            Write-Warning "Could not read $($proj.FullName)"
          }
        }
        
        Write-Host ""
        Write-Host "Package Management Detection Results:"
        Write-Host "Solution: ${{ matrix.project }}"
        Write-Host "packages.config files: $($packagesConfigFiles.Count)"
        Write-Host ".vcxproj files scanned: $($vcxprojFiles.Count)"
        Write-Host "PackageReference entries: $packageRefCount"
        Write-Host "Has packages.config: $hasPackagesConfig"
        Write-Host "Has PackageReference: $hasPackageReference"
        
        $needsRestore = $false
        
        if ($hasPackagesConfig)
        {
          Write-Host ""
          Write-Host "Strategy 1: Legacy packages.config restore"
          try
          {
            nuget restore ${{ matrix.solution_file }}
            Write-Host "packages.config restore completed"
            $needsRestore = $true
          }
          catch
          {
            Write-Warning "packages.config restore failed: $($_.Exception.Message)"
          }
        }
        
        if ($hasPackageReference)
        {
          Write-Host ""
          Write-Host "Strategy 2: PackageReference restore (will be handled by MSBuild)"
          $needsRestore = $true
        }
        
        if (-not $needsRestore)
        {
          Write-Host ""
          Write-Host "No NuGet packages detected - this solution uses only system libraries"
          Write-Host "This is normal for projects that only use DirectX, Windows SDK, etc."
        }
        
        Write-Host ""
        Write-Host "Package restore strategy complete for ${{ matrix.project }}"

    - name: Build ${{ matrix.project }}
      working-directory: ${{ matrix.solution_path }}
      run: |
        Write-Host "Building ${{ matrix.project }} (${{ matrix.configuration }}|${{ matrix.platform }})"
        msbuild ${{ matrix.solution_file }} `
        -t:Restore,Build `
        -p:Configuration=${{ matrix.configuration }} `
        -p:Platform=${{ matrix.platform }} `
        -maxCpuCount `
        -verbosity:minimal

    - name: Upload Artifacts
      if: matrix.upload_artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          ${{ matrix.solution_path }}/Binaries/**/${{ matrix.configuration }}/**/*.exe
          ${{ matrix.solution_path }}/Binaries/**/${{ matrix.configuration }}/**/*.dll
          ${{ matrix.solution_path }}/Binaries/**/${{ matrix.configuration }}/**/*.pdb
          ${{ matrix.solution_path }}/Libraries/**/${{ matrix.configuration }}/**/*.lib
          ${{ matrix.solution_path }}/**/Resource/Shader/**/*.hlsl
        retention-days: 30
