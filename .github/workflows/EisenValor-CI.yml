    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-dummy-${{ runner.os }}-${{ hashFiles('EisenValor-DummyClient/**/packages.config', 'EisenValor-DummyClient/**/*.vcxproj') }}
        restore-keys: |
          nuget-dummy-${{ runner.os }}-

    - name: Build EisenValor-DummyClient
      working-directory: EisenValor-DummyClient
      run: |
        Write-Host "Building EisenValor-DummyClient (${{ matrix.configuration }}|${{ matrix.platform }})"
        
        msbuild *.sln `
          -t:Restore,Build `
          -p:Configuration=${{ matrix.configuration }} `
          -p:Platform=${{ matrix.platform }} `
